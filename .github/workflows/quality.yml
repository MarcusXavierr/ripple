name: Code Quality

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Biome lint
        run: npm run lint

      - name: Biome format check
        run: npx biome format --check .

      - name: TypeScript type check
        run: npx tsc --noEmit
